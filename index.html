<!doctype html>
<html lang="fr">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("asuka-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (!t && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
